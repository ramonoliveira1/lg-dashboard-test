services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lg-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lg-network

  nginx:
    image: nginx:1.25-alpine
    container_name: lg-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lg-network

  db:
    image: mysql:8.0
    container_name: lg-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lg_dashboard
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - lg-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lg-network

networks:
  lg-network:
    driver: bridge

volumes:
  lg-mysql-data:
    driver: local

